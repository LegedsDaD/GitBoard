<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <filter id="hud-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <pattern id="bg-grid-pattern" width="25" height="25" patternUnits="userSpaceOnUse">
            <path d="M 25 0 L 0 0 0 25" fill="none" stroke="rgba(255, 0, 128, 0.03)" stroke-width="1"/>
        </pattern>

        <style>
            @keyframes cw-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
            @keyframes ccw-rotate { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
            @keyframes pulse-glow { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }
            @keyframes sync-flash {
                0% { stroke-width: 1px; opacity: 0.25; }
                15% { stroke-width: 3px; opacity: 1; stroke: #ff007f; filter: drop-shadow(0 0 4px rgba(255, 0, 128, 0.4)); }
                100% { stroke-width: 1px; opacity: 0.25; }
            }
            @keyframes arc-pulse {
                0%, 100% { transform: scale(1); opacity: 0.8; }
                50% { transform: scale(1.015); opacity: 1; }
            }

            .anim-cw { transform-origin: 400px 245px; animation: cw-rotate 12s linear infinite; }
            .anim-ccw { transform-origin: 400px 245px; animation: ccw-rotate 16s linear infinite; }
            .anim-orbit-slow { transform-origin: 400px 245px; animation: ccw-rotate 24s linear infinite; }
            .anim-pulse { animation: pulse-glow 3s infinite ease-in-out; }
            .sync-link-pulse { transform-origin: 400px 245px; animation: sync-flash 2.5s infinite cubic-bezier(0.4, 0, 0.2, 1); }
            .language-arc-group { transform-origin: 400px 245px; animation: arc-pulse 4s infinite ease-in-out; }
            
            .constellation-node { transition: transform 0.4s ease; }
            .constellation-node:hover { transform: scale(1.4); transform-origin: center; cursor: crosshair; }
        </style>
    </defs>

    <rect width="100%" height="100%" fill="#020408" />

    <rect width="100%" height="100%" fill="url(#bg-grid-pattern)" />
    <line x1="0" y1="245" x2="800" y2="245" stroke="rgba(255, 0, 128, 0.03)" stroke-width="1.5" />
    <line x1="400" y1="0" x2="400" y2="500" stroke="rgba(255, 0, 128, 0.03)" stroke-width="1.5" />

    <g id="repositoryConstellation" opacity="0.4">
        <path d="M 75,90 L 140,70 L 210,110 L 160,180 L 75,90 M 210,110 L 290,65 M 160,180 L 220,250 M 680,80 L 730,150 L 640,165 L 680,80 M 640,165 L 570,115 M 90,320 L 120,380 L 50,410 M 710,330 L 750,420 L 690,390 L 710,330" 
              fill="none" stroke="#7b00ff" stroke-width="0.75" stroke-dasharray="2,4" />
        <circle cx="75" cy="90" r="3" fill="#ff007f" class="constellation-node" />
        <circle cx="140" cy="70" r="2" fill="#b199cf" class="constellation-node" />
        <circle cx="210" cy="110" r="4" fill="#7b00ff" class="constellation-node" />
        <circle cx="160" cy="180" r="2.5" fill="#ff007f" class="constellation-node" />
        <circle cx="290" cy="65" r="3" fill="#ffffff" class="constellation-node" />
        <circle cx="220" cy="250" r="2" fill="#7b00ff" class="constellation-node" />
        <circle cx="680" cy="80" r="3.5" fill="#ff007f" class="constellation-node" />
        <circle cx="730" cy="150" r="2" fill="#b199cf" class="constellation-node" />
        <circle cx="640" cy="165" r="4" fill="#7b00ff" class="constellation-node" />
        <circle cx="570" cy="115" r="2" fill="#ff007f" class="constellation-node" />
        <circle cx="90" cy="320" r="3" fill="#7b00ff" class="constellation-node" />
        <circle cx="120" cy="380" r="2" fill="#ff007f" class="constellation-node" />
        <circle cx="50" cy="410" r="3.5" fill="#b199cf" class="constellation-node" />
        <circle cx="710" cy="330" r="2.5" fill="#7b00ff" class="constellation-node" />
        <circle cx="750" cy="420" r="4" fill="#ff007f" class="constellation-node" />
        <circle cx="690" cy="390" r="2" fill="#ffffff" class="constellation-node" />
    </g>

    <g transform="translate(25, 35)">
        <text x="0" y="15" fill="#ffffff" font-family="ui-monospace, monospace" font-size="16" font-weight="bold" letter-spacing="0.05em">{{USERNAME}}</text>
        <text x="175" y="13" fill="#ff007f" font-family="ui-monospace, monospace" font-size="9" font-weight="bold" letter-spacing="0.12em">OS_USER // IDENTIFIED</text>
    </g>

    <g transform="translate(580, 35)" font-family="ui-monospace, monospace">
