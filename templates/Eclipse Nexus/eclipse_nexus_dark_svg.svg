    <circle cx="400" cy="245" r="115" fill="none" stroke="#ff007f" stroke-width="0.75" stroke-dasharray="8, 12 40, 15 4, 8" opacity="0.5" class="anim-orbit-slow" />
    <circle cx="400" cy="245" r="105" fill="none" stroke="#7b00ff" stroke-width="0.75" opacity="0.3" />
    
    <g class="anim-cw">
